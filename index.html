<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosko - Tu Tienda</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="logo-area">
                <i class="fas fa-store"></i>
                <h1>Kiosko</h1>
            </div>
            <button id="adminAccessBtn" class="admin-access-btn">
                <i class="fas fa-user-shield"></i> Admin
            </button>
        </header>

        <!-- Modal de Login Admin (SOLO CON NÚMERO PERUANO OCULTO) -->
        <div id="adminLoginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <i class="fas fa-store" style="font-size: 48px; color: #2c3e50;"></i>
                <h3>Acceso Administrador</h3>
                <p>Ingresa tu número de WhatsApp registrado</p>
                <input type="tel" id="adminPhoneInput" placeholder="Número de WhatsApp" autocomplete="off">
                <button id="verifyAdminPhoneBtn" class="btn-primary">Verificar</button>
                <p id="adminLoginError" class="error-msg"></p>
                <small style="display: block; margin-top: 10px; color: #7f8c8d;">* Solo el número registrado tiene acceso</small>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div class="main-content">
            <!-- Catálogo -->
            <div class="catalog-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar productos...">
                </div>
                
                <div class="categories-tabs" id="categoriesTabs"></div>
                
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- Carrito de Compras -->
            <div class="cart-container">
                <div class="cart-header">
                    <h3><i class="fas fa-shopping-cart"></i> Tu Pedido</h3>
                    <button id="clearCartBtn" class="btn-clear">Vaciar</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">No hay productos en el carrito</div>
                </div>
                <div class="cart-footer">
                    <div class="total-row">
                        <span>TOTAL:</span>
                        <span class="total-amount" id="totalAmount">S/ 0.00</span>
                    </div>
                    <button id="shareWhatsAppBtn" class="btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> Compartir por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notificación flotante -->
    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
